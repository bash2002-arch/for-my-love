<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Happy Birthday Ruqiya ❤️</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&family=Cinzel:wght@500;700&family=Allura&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <!-- AOS -->
    <link rel="stylesheet"
        href="https://unpkg.com/aos@2.3.4/dist/aos.css">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>

<body>
<div class="hearts">
    <span>❤️</span>
    <span>💗</span>
    <span>💕</span>
    <span>❤️</span>
    <span>💖</span>
    <span>💗</span>
    <span>❤️</span>
    <span>💗</span>
    <span>💕</span>
    <span>❤️</span>
    <span>💖</span>
    <span>💗</span>
</div>
    <!-- Loader -->

    <div id="loader">

        <div class="heart-loader">❤️</div>

        <h2>Preparing Something Special...</h2>

    </div>

    <!-- Background -->

    <div class="background-hearts"></div>

    <!-- Main Card -->

    <div class="container" data-aos="zoom-in">

        <p class="welcome">
            ✨ A Special Day ✨
        </p>

        <h1 class="birthday">
            Happy Birthday
        </h1>

        <h2 class="toyou">
            TO YOU
        </h2>

        <h1 class="name">
            Ruqiya
        </h1>

        <p class="subtitle">
            A little surprise prepared with love,
            especially for you. ❤️
        </p>

        <button id="openBtn">
            💌 Open My Heart
        </button>

    </div>

    <!-- AOS -->

    <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>

    <script>
        AOS.init({
            duration: 1200,
            once: true
        });
    </script>

    <script src="script.js"></script>
    <audio id="bgMusic" loop>
    <source src="assets/music/song.mp3.mp3" type="audio/mpeg">
</audio>
</body>

</html>
